<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knock-Off MUI Buttons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <h1>MUI Buttons — Vanilla JS</h1>

      <section>
        <h2>Text</h2>
        <div class="row">
          <button class="btn btn-text btn-primary">Primary</button>
          <button class="btn btn-text btn-secondary">Secondary</button>
          <button class="btn btn-text btn-primary" disabled>Disabled</button>
        </div>
      </section>

      <section>
        <h2>Contained</h2>
        <div class="row">
          <button class="btn btn-contained btn-primary">Primary</button>
          <button class="btn btn-contained btn-secondary">Secondary</button>
          <button class="btn btn-contained btn-primary" disabled>Disabled</button>
        </div>
      </section>

      <section>
        <h2>Outlined</h2>
        <div class="row">
          <button class="btn btn-outlined btn-primary">Primary</button>
          <button class="btn btn-outlined btn-secondary">Secondary</button>
          <button class="btn btn-outlined btn-primary" disabled>Disabled</button>
        </div>
      </section>

      <section>
        <h2>Colors</h2>
        <div class="row">
          <button class="btn btn-contained btn-primary">Primary</button>
          <button class="btn btn-contained btn-secondary">Secondary</button>
          <button class="btn btn-contained btn-success">Success</button>
          <button class="btn btn-contained btn-error">Error</button>
          <button class="btn btn-contained btn-warning">Warning</button>
          <button class="btn btn-contained btn-info">Info</button>
        </div>
        <div class="row">
          <button class="btn btn-outlined btn-primary">Primary</button>
          <button class="btn btn-outlined btn-secondary">Secondary</button>
          <button class="btn btn-outlined btn-success">Success</button>
          <button class="btn btn-outlined btn-error">Error</button>
          <button class="btn btn-outlined btn-warning">Warning</button>
          <button class="btn btn-outlined btn-info">Info</button>
        </div>
        <div class="row">
          <button class="btn btn-text btn-primary">Primary</button>
          <button class="btn btn-text btn-secondary">Secondary</button>
          <button class="btn btn-text btn-success">Success</button>
          <button class="btn btn-text btn-error">Error</button>
          <button class="btn btn-text btn-warning">Warning</button>
          <button class="btn btn-text btn-info">Info</button>
        </div>
      </section>

      <section>
        <h2>Sizes</h2>
        <div class="row align-center">
          <button class="btn btn-contained btn-primary btn-sm">Small</button>
          <button class="btn btn-contained btn-primary">Medium</button>
          <button class="btn btn-contained btn-primary btn-lg">Large</button>
        </div>
        <div class="row align-center">
          <button class="btn btn-outlined btn-primary btn-sm">Small</button>
          <button class="btn btn-outlined btn-primary">Medium</button>
          <button class="btn btn-outlined btn-primary btn-lg">Large</button>
        </div>
        <div class="row align-center">
          <button class="btn btn-text btn-primary btn-sm">Small</button>
          <button class="btn btn-text btn-primary">Medium</button>
          <button class="btn btn-text btn-primary btn-lg">Large</button>
        </div>
      </section>

      <section>
        <h2>Loading</h2>
        <div class="row">
          <button class="btn btn-contained btn-primary btn-loading">
            <span class="btn-label">Fetch Data</span>
          </button>
          <button class="btn btn-outlined btn-primary btn-loading">
            <span class="btn-label">Fetch Data</span>
          </button>
          <button class="btn btn-text btn-primary btn-loading">
            <span class="btn-label">Fetch Data</span>
          </button>
        </div>
      </section>

      <section>
        <h2>With Icons</h2>
        <div class="row">
          <button class="btn btn-contained btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
            Add
          </button>
          <button class="btn btn-contained btn-secondary">
            Send
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
          <button class="btn btn-outlined btn-error">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6zM19 4h-3.5l-1-1h-5l-1 1H5v2h14z"/></svg>
            Delete
          </button>
          <button class="btn btn-text btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
            Back
          </button>
        </div>
      </section>

      <section>
        <h2>Icon Buttons</h2>
        <div class="row align-center">
          <button class="btn-icon-only btn-primary" aria-label="Add">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
          </button>
          <button class="btn-icon-only btn-secondary" aria-label="Bookmark">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
          </button>
          <button class="btn-icon-only btn-error" aria-label="Favorite">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
          </button>
          <button class="btn-icon-only btn-success" aria-label="Check">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </button>
          <button class="btn-icon-only btn-primary" aria-label="Delete" disabled>
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6zM19 4h-3.5l-1-1h-5l-1 1H5v2h14z"/></svg>
          </button>
        </div>
      </section>
    </div>

    <script src="main.js"></script>
  </body>
</html>
