<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Carousel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="carousel">
      <div class="carousel-track-container">
        <ul class="carousel-track"></ul>
      </div>

      <button class="carousel-btn carousel-btn--left" aria-label="Previous slide">&#8249;</button>
      <button class="carousel-btn carousel-btn--right" aria-label="Next slide">&#8250;</button>

      <div class="carousel-dots"></div>
    </div>

    <div class="submit-bar">
      <span class="submit-count">0 selected</span>
      <button class="submit-btn" id="submitBtn">Submit Selection</button>
    </div>

    <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true">

        <!-- Shared stepper -->
        <div class="stepper">
          <div class="stepper-step" id="step1">
            <div class="stepper-bubble">1</div>
            <span>Your Information</span>
          </div>
          <div class="stepper-line" id="stepLine"></div>
          <div class="stepper-step" id="step2">
            <div class="stepper-bubble">2</div>
            <span>Review Order</span>
          </div>
        </div>

        <!-- Screen 1: Info form -->
        <div class="modal-screen" id="screenInfo">
          <h2 class="modal-title">Your Information</h2>
          <form id="infoForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" autocomplete="given-name" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" autocomplete="family-name" required>
              </div>
            </div>
            <div class="form-group">
              <label for="streetAddress">Street Address</label>
              <input type="text" id="streetAddress" name="streetAddress" autocomplete="street-address" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" autocomplete="address-level2" required>
              </div>
              <div class="form-group form-group--sm">
                <label for="state">State</label>
                <input type="text" id="state" name="state" autocomplete="address-level1" maxlength="2" required>
              </div>
              <div class="form-group form-group--sm">
                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" autocomplete="postal-code" maxlength="10" required>
              </div>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-secondary" id="modalCancel">Cancel</button>
              <button type="submit" class="btn-primary">Next</button>
            </div>
          </form>
        </div>

        <!-- Screen 2: Review -->
        <div class="modal-screen" id="screenReview">
          <h2 class="modal-title">Review Your Order</h2>
          <div class="review-photo">
            <img id="reviewImg" src="" alt="">
            <span id="reviewPhotoLabel"></span>
          </div>
          <div class="review-section">
            <p class="review-section-heading">Shipping Information</p>
            <p id="reviewName"></p>
            <p id="reviewAddress"></p>
            <p id="reviewCityStateZip"></p>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="reviewBack">Back</button>
            <button type="button" class="btn-primary" id="confirmOrderBtn">Confirm Order</button>
          </div>
        </div>

        <!-- Screen 3: Success -->
        <div class="modal-screen modal-screen--success" id="screenSuccess">
          <div class="success-icon">&#10003;</div>
          <h2 class="success-title">Your Gift has been ordered!</h2>
          <p class="success-sub">We'll be in touch soon with your delivery details.</p>
          <button type="button" class="btn-primary success-close" id="successClose">Done</button>
        </div>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
