<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Carousel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bilt-carousel">
      <div class="bilt-carousel-track-container">
        <ul class="bilt-carousel-track"></ul>
      </div>

      <button class="bilt-carousel-btn bilt-carousel-btn--left" aria-label="Previous slide">&#8249;</button>
      <button class="bilt-carousel-btn bilt-carousel-btn--right" aria-label="Next slide">&#8250;</button>

      <div class="bilt-carousel-dots"></div>
    </div>

    <div class="bilt-submit-bar">
      <span class="bilt-submit-count">0 selected</span>
      <button class="bilt-submit-btn" id="biltSubmitBtn">Submit Selection</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
